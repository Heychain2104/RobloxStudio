<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RBXL Catalog</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    margin: 0;
}

.topbar {
    background-color: white;
    border-bottom: 1px solid #ccc;
    padding: 12px 20px;
    font-weight: bold;
    color: black;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 200px);
    gap: 20px;
    padding: 20px;
    justify-content: center;
}

.card {
    background: white;
    border: 1px solid #ccc;
    padding: 10px;
    transition: all 0.2s ease;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.08);
    z-index: 10;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.title {
    font-size: 14px;
    margin-top: 5px;
}

.rating {
    font-size: 12px;
    color: #555;
    margin-top: 5px;
    opacity: 0;
}

.card:hover .rating {
    opacity: 1;
}

/* DETALLE estilo Roblox accesorio */
.detail {
    display: none;
    padding: 40px;
}

.detail-wrapper {
    max-width: 900px;
    margin: auto;
    text-align: center;
    background: white;
    padding: 30px;
    border: 1px solid #ccc;
}

.detail img {
    width: 500px;
    max-width: 100%;
    margin-bottom: 20px;
}

.detail h2 {
    font-size: 28px;
    margin: 10px 0;
}

.detail .date {
    font-size: 16px;
    color: #666;
    margin-bottom: 15px;
}

.detail .desc {
    font-size: 18px;
    margin-bottom: 25px;
}

.download-btn {
    background-color: #00b06f;
    color: white;
    padding: 18px;
    font-size: 20px;
    font-weight: bold;
    display: inline-block;
    width: 250px;
    border-radius: 5px;
    text-decoration: none;
}

.download-btn:hover {
    background-color: #00995f;
}
</style>
</head>
<body>

<div class="topbar">Catálogo</div>

<!-- LISTA -->
<div id="catalog" class="grid">

    <div class="card" onclick="openDetail('mapa1')">
        <img src="https://via.placeholder.com/200x120">
        <div class="title">Mapa 1</div>
        <div class="rating">⭐ 4.5</div>
    </div>

    <div class="card" onclick="openDetail('obby')">
        <img src="https://via.placeholder.com/200x120">
        <div class="title">Obby Challenge</div>
        <div class="rating">⭐ 4.8</div>
    </div>

</div>

<!-- DETALLE -->
<div id="detail-mapa1" class="detail">
    <div class="detail-wrapper">
        <img src="https://via.placeholder.com/500x300">
        <h2>Mapa 1</h2>
        <div class="date">📅 Creado en 2026</div>
        <div class="desc">Un mapa clásico de Roblox con estilo retro.</div>
        <a class="download-btn" href="files/mapa1.rbxl" download>Obtener</a>
    </div>
</div>

<div id="detail-obby" class="detail">
    <div class="detail-wrapper">
        <img src="https://via.placeholder.com/500x300">
        <h2>Obby Challenge</h2>
        <div class="date">📅 Creado en 2026</div>
        <div class="desc">Un obby divertido inspirado en los clásicos.</div>
        <a class="download-btn" href="files/obby.rbxl" download>Obtener</a>
    </div>
</div>

<script>
function openDetail(id) {
    document.getElementById('catalog').style.display = 'none';
    document.querySelectorAll('.detail').forEach(el => el.style.display = 'none');
    document.getElementById('detail-' + id).style.display = 'block';
}
</script>

</body>
</html>
