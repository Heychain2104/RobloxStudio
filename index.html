<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RBXL Catalog</title>
<style>
body { font-family: Arial, sans-serif; background:#f2f2f2; margin:0; }
.topbar { background:#fff; border-bottom:1px solid #ccc; padding:12px 20px; font-weight:bold; }

.grid { display:grid; grid-template-columns:repeat(auto-fill,200px); gap:20px; padding:20px; justify-content:center; }
.card { background:#fff; border:1px solid #ccc; padding:10px; cursor:pointer; transition:.2s; }
.card:hover { transform:scale(1.08); box-shadow:0 4px 10px rgba(0,0,0,.2); }
.card img { width:100%; height:120px; object-fit:cover; }
.title { font-size:14px; }
.rating { font-size:12px; opacity:0; }
.card:hover .rating { opacity:1; }

.detail { display:none; padding:40px; }
.detail-wrapper { max-width:900px; margin:auto; text-align:center; background:#fff; padding:30px; border:1px solid #ccc; }
.detail img { width:500px; max-width:100%; }
.detail h2 { font-size:28px; }
.date { color:#666; }
.desc { font-size:18px; }
.download-btn { background:#00b06f; color:#fff; padding:18px; font-size:20px; font-weight:bold; display:inline-block; width:250px; border-radius:5px; cursor:pointer; }

.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.7); justify-content:center; align-items:center; }
.modal-content { background:#fff; padding:20px; text-align:center; width:400px; }
.modal img { width:200px; margin:10px 0; }
.modal-buttons { display:flex; justify-content:space-between; margin-top:15px; }
.btn-yes { background:#00b06f; color:#fff; padding:10px 20px; cursor:pointer; }
.btn-no { background:#ccc; padding:10px 20px; cursor:pointer; }
</style>
</head>
<body>

<div class="topbar">Catálogo</div>

<div id="catalog" class="grid"></div>

<div id="detail" class="detail">
    <div class="detail-wrapper" id="detail-content"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>¿Quieres descargar el archivo del siguiente juego?</h3>
        <img id="modal-img">
        <div class="modal-buttons">
            <div class="btn-yes" onclick="downloadFile()">Sí</div>
            <div class="btn-no" onclick="closeModal()">No</div>
        </div>
    </div>
</div>

<script>
const items = [
    {
        name: "Mapa 1",
        image: "Images/mapa1.png",
        file: "Games/mapa1.rbxl",
        date: "2026",
        description: "Un mapa clásico estilo Roblox."
    },
    {
        name: "Obby Challenge",
        image: "Images/obby.png",
        file: "Games/obby.rbxl",
        date: "2026",
        description: "Un obby divertido clásico."
    }
];

const catalog = document.getElementById("catalog");
const detail = document.getElementById("detail");
const detailContent = document.getElementById("detail-content");

// Generar catálogo
items.forEach((item, index) => {
    catalog.innerHTML += `
        <div class="card" onclick="openDetail(${index})">
            <img src="${item.image}">
            <div class="title">${item.name}</div>
            <div class="rating">⭐ 4.5</div>
        </div>
    `;
});

function openDetail(index) {
    const item = items[index];

    catalog.style.display = "none";
    detail.style.display = "block";

    detailContent.innerHTML = `
        <img src="${item.image}">
        <h2>${item.name}</h2>
        <div class="date">📅 Creado en ${item.date}</div>
        <div class="desc">${item.description}</div>
        <div class="download-btn" onclick="openModal('${item.file}','${item.image}')">Obtener</div>
    `;
}

let currentFile = "";

function openModal(file, img) {
    currentFile = file;
    document.getElementById("modal-img").src = img;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function downloadFile() {
    window.location.href = currentFile;
}
</script>

</body>
</html>
